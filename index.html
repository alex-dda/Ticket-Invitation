<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTE PARTY</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>GTE PARTY</h1>
    <p id="formIntro">Bitte füllen Sie dieses Formular aus, um Ihr Ticket zu kaufen:</p>

    <form id="ticketForm">
      
      <div class="form-group">
        <label for="anrede">Anrede:</label>
        <select id="anrede" required>
          <option value="">--Auswählen--</option>
          <option value="Hr.">Hr.</option>
          <option value="Fr.">Fr.</option>
        </select>
      </div>

      <div class="form-group">
        <label for="prenom">Vorname:</label>
        <input type="text" id="prenom" required>
      </div>

      <div class="form-group">
        <label for="nom">Nachname:</label>
        <input type="text" id="nom" required>
      </div>

      <div class="form-group">
        <label for="email">E-Mail:</label>
        <input type="email" id="email" required>
      </div>

      <div class="tel-section">
        <label class="main-label">Telefonnummer:</label>
        
        <div class="form-group-radio">
          <span class="radio-label">Land:</span>
          <input type="radio" id="paysDe" name="paysTel" value="DE">
          <label for="paysDe">DE</label>
          
          <input type="radio" id="paysCmr" name="paysTel" value="Cmr">
          <label for="paysCmr">Cmr</label>
        </div>

        <div class="form-group-tel-input">
          <span id="indicatif"></span>
          <input type="tel" id="tel" required>
        </div>
      </div>

      <div class="form-group-radio">
        <span class="radio-label">Status (GTE):</span>
        <input type="radio" id="statutInterne" name="statut" value="interne">
        <label for="statutInterne">Intern</label>
        
        <input type="radio" id="statutExterne" name="statut" value="externe">
        <label for="statutExterne">Extern</label>
      </div>

      <div class="form-group price-group">
        <label for="computedPrice">Ticketpreis:</label>
        <input type="text" id="computedPrice" value="" readonly>
      </div>

      <div class="form-group">
        <label for="paiement">Zahlungsart:</label>
        <select id="paiement" required>
          <option value="">--Auswählen--</option>
          <option value="PayPal">PayPal</option>
          <option value="Überweisung">Banküberweisung</option>
        </select>
      </div>

      <button type="submit" id="submitBtn">Ticket erhalten</button>
    </form>

    <div id="ticket" class="hidden">
      <h2>Ihr Ticket</h2>
      <p><strong>Name:</strong> <span id="displayName"></span></p>
      <p><strong>Status:</strong> <span id="displayStatut"></span></p>
      <p><strong>Preis:</strong> <span id="displayPrice"></span></p>
      <p><strong>Zahlung:</strong> <span id="displayPaiement"></span></p>
      <p><strong>Datum:</strong> 3. Oktober 2026</p>
      <p><strong>Ort:</strong> Duisburg</p>
      <p><strong>Uhrzeit:</strong> 20:00 Uhr</p>
      <p><strong>Motto:</strong> Chic und Stylée</p>
      <canvas id="qrCode"></canvas>
      <button id="downloadBtn">Ticket als PDF herunterladen</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="firebase-config.js"></script>

  <script>
    let lastPdfDoc = null;
    let ticketId = "";
    let fullName = "";
    let formattedTel = "";
    let currentPriceText = "";

    const db = firebase.firestore();

    const form = document.getElementById('ticketForm');
    const ticket = document.getElementById('ticket');
    const displayName = document.getElementById('displayName');
    const displayStatut = document.getElementById('displayStatut');
    const displayPrice = document.getElementById('displayPrice');
    const displayPaiement = document.getElementById('displayPaiement');
    const qrCanvas = document.getElementById('qrCode');
    const downloadBtn = document.getElementById('downloadBtn');

    const anredeSelect = document.getElementById('anrede');
    const computedPriceInput = document.getElementById('computedPrice');
    const indicatifSpan = document.getElementById('indicatif');

    // Verwaltung der Telefonvorwahl (wird erst bei Klick aktiv)
    document.querySelectorAll('input[name="paysTel"]').forEach(radio => {
      radio.addEventListener('change', function() {
        if (this.value === 'DE') {
          indicatifSpan.textContent = '+49 ';
        } else if (this.value === 'Cmr') {
          indicatifSpan.textContent = '+237 ';
        }
      });
    });

    // Automatische Preisberechnung
    function calculerPrix() {
      const anrede = anredeSelect.value;
      const statutRadio = document.querySelector('input[name="statut"]:checked');

      if (!anrede || !statutRadio) {
        currentPriceText = "";
        computedPriceInput.value = "";
        return;
      }

      const statut = statutRadio.value;

      if (statut === 'externe') {
        currentPriceText = "20 €";
      } else {
        currentPriceText = "15 €";
      }
      computedPriceInput.value = currentPriceText;
    }

    anredeSelect.addEventListener('change', calculerPrix);
    document.querySelectorAll('input[name="statut"]').forEach(radio => {
      radio.addEventListener('change', calculerPrix);
    });

    // Formular absenden
    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const anrede = anredeSelect.value;
      const prenom = document.getElementById('prenom').value.trim();
      const nom = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const rawTel = document.getElementById('tel').value.trim();
      const paysRadio = document.querySelector('input[name="paysTel"]:checked');
      const statutRadio = document.querySelector('input[name="statut"]:checked');
      const paiement = document.getElementById('paiement').value;

      // Zusätzliche Sicherheitsüberprüfungen vor dem Absenden
      if (!paysRadio) {
        alert("Bitte wählen Sie ein Land für die Telefonnummer aus!");
        return;
      }
      if (!statutRadio || !currentPriceText) {
        alert("Bitte wählen Sie zuerst Ihren Status aus!");
        return;
      }

      const statut = statutRadio.value;
      fullName = `${anrede} ${prenom} ${nom}`;
      formattedTel = `${indicatifSpan.textContent}${rawTel}`;
      ticketId = "gte_" + email.replace(/[^a-zA-Z0-9]/g, "_");

      try {
        const snapshot = await db.collection("billets").where("email", "==", email).get();
        if (!snapshot.empty) {
          alert("Für diese E-Mail-Adresse wurde bereits ein Ticket erstellt!");
          return;
        }

        await db.collection("billets").doc(ticketId).set({
          anrede,
          prenom,
          nom,
          email,
          tel: formattedTel,
          statut,
          paiement,
          prix: currentPriceText,
          valide: true,
          timestamp: new Date().toISOString()
        });

        displayName.textContent = fullName;
        displayStatut.textContent = statut === 'interne' ? 'Intern' : 'Extern';
        displayPrice.textContent = currentPriceText;
        displayPaiement.textContent = paiement === 'PayPal' ? 'PayPal' : 'Banküberweisung';

        const qr = new QRious({ element: qrCanvas, value: ticketId, size: 200 });
        ticket.classList.remove('hidden');
        form.classList.add('hidden');
        document.getElementById('formIntro').classList.add('hidden');

        // === PDF ===
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "pt", format: "a4" });

        const pageWidth = doc.internal.pageSize.getWidth();
        const margin = 40;
        const contentWidth = pageWidth - margin * 2;

        doc.setFillColor(255, 255, 255);
        doc.roundedRect(margin, margin, contentWidth, 400, 10, 10, "F");
        doc.setDrawColor("#1e90ff");
        doc.setLineWidth(2);
        doc.roundedRect(margin, margin, contentWidth, 400, 10, 10, "S");

        doc.setFont("helvetica", "italic");
        doc.setFontSize(32);
        doc.setTextColor("#6A0DAD");
        doc.text(" GTE PARTY ", pageWidth / 2, margin + 60, { align: "center" });

        doc.setFontSize(15);
        doc.setFont("times", "bold");
        doc.setTextColor("#191970");
        const startY = margin + 140;
        const lineHeight = 24;
        doc.text(`Name: ${fullName}`, margin + 20, startY);
        doc.text(`Telefon: ${formattedTel}`, margin + 20, startY + lineHeight);
        doc.text(`Status: ${statut === 'interne' ? 'INTERN' : 'EXTERN'}`, margin + 20, startY + 2 * lineHeight);
        doc.text(`Preis: ${currentPriceText}`, margin + 20, startY + 3 * lineHeight);
        doc.text(`Zahlungsart: ${paiement === 'PayPal' ? 'PayPal' : 'Banküberweisung'}`, margin + 20, startY + 4 * lineHeight);
        doc.text("Datum: 3. Oktober 2026", margin + 20, startY + 5 * lineHeight);
        doc.text("Ort: Duisburg", margin + 20, startY + 6 * lineHeight);
        doc.text(`Ticket-Code: ${ticketId}`, margin + 20, startY + 7 * lineHeight);

        const qrImage = qrCanvas.toDataURL("image/png");
        const qrSize = 130; 
        const borderSize = 140; 
        const qrX = pageWidth - margin - 180; 
        const qrY = startY;

        doc.roundedRect(qrX - 5, qrY - 5, borderSize, borderSize, 10, 10, "S");
        doc.addImage(qrImage, "PNG", qrX, qrY, qrSize, qrSize); 

        doc.setFontSize(12);
        doc.setTextColor("#666666");
        doc.text("Bitte bringen Sie dieses Ticket zur Party mit. Viel Spaß!", pageWidth / 2, margin + 420, { align: "center" });

        lastPdfDoc = doc;
        console.log("PDF erfolgreich generiert");

      } catch (error) {
        console.error("Firebase-Fehler: ", error);
        alert("Bei der Verbindung zur Datenbank ist ein Fehler aufgetreten.");
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (lastPdfDoc) {
        lastPdfDoc.save(`${ticketId}.pdf`);
      } else {
        alert("Kein Ticket zum Herunterladen verfügbar.");
      }
    });
  </script>
</body>
</html>
